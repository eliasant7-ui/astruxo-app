# ============================================
# GitHub Actions Workflow for astruXo Deployment
# ============================================
# This workflow builds and deploys the application
# to your server via SSH/SCP
# ============================================

name: Deploy to Production

on:
  push:
    branches:
      - main      # Deploy on push to main branch
      - master    # Or master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build application
      - name: Build application
        run: npm run build
        env:
          # Add any build-time environment variables here
          NODE_ENV: production

      # 5. Deploy to server via SSH/SCP
      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          SOURCE: "dist/"
          TARGET: ${{ secrets.DEPLOY_PATH }}
          EXCLUDE: "/dist/, /node_modules/"
          ARGS: "-rltgoDzvO"

      # 6. Restart application on server
      - name: Restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            pm2 restart all || echo "PM2 not found, trying npm"
            # Alternative restart commands:
            # npm run start
            # systemctl restart astruxo

      # 7. Notify success
      - name: Deployment complete
        run: echo "✅ Deployment completed successfully!"
