    <!-- Cache Control - Force reload after bug fix -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <meta name="twitter:card" content="summary" />

    <meta property="og:image:type" content="image/png" />
    
    <link rel="manifest" href="/manifest.json" />
    <title>astruXo</title>
  </head>
  <body class="fs-unmask-airo-app-builder">
    <div id="app" class="fs-unmask-airo-app-builder"></div>
    
    <!-- CRITICAL: Force cache bust ALWAYS - No Service Worker caching -->
    <script>
      (function() {
        const BUILD_TIMESTAMP = '20260304-083900'; // Update on every build
        
        console.log('🔄 Cache Buster Active - Build:', BUILD_TIMESTAMP);
        
        // ALWAYS unregister service workers on load
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            if (registrations.length > 0) {
              console.log('🧹 Removing', registrations.length, 'service worker(s)...');
              registrations.forEach(function(registration) {
                registration.unregister();
              });
            }
          });
        }
        
        // ALWAYS clear caches on load
        if ('caches' in window) {
          caches.keys().then(function(cacheNames) {
            if (cacheNames.length > 0) {
              console.log('🧹 Clearing', cacheNames.length, 'cache(s)...');
              cacheNames.forEach(function(cacheName) {
                caches.delete(cacheName);
              });
            }
          });
        }
        
        // Add timestamp to all script imports to force fresh download
        window.__BUILD_TIMESTAMP__ = BUILD_TIMESTAMP;
      })();
    </script>
    
    <script type="module">
      if (import.meta.env.MODE === 'development') {
        import('/dev-tools/src/error-client.ts')
      }
      import('/src/main.tsx')
    </script>
    <script src="/analytics.js"></script>
  </body>
</html>
