<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      text-align: center;
      color: white;
    }
    .logo {
      width: 300px;
      height: 300px;
      margin: 0 auto 30px;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
    }
    .title {
      font-size: 72px;
      font-weight: bold;
      margin: 0 0 20px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .subtitle {
      font-size: 36px;
      margin: 0;
      opacity: 0.9;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 24px;
      margin-top: 20px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="astruXo" class="logo">
    <h1 class="title">astruXo</h1>
    <p class="subtitle">Social Streaming Platform</p>
    <div class="badge">Beta</div>
  </div>
</body>
</html>
